<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>泌尿醫學專業網站</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background-color: #f0f4f8;
      color: #1a3a5c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      background-color: #1a3a5c;
      color: white;
      text-align: center;
      padding: 48px 20px 36px;
    }
    header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: 4px;
      margin-bottom: 12px;
    }
    header h2 {
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 2px;
      color: #a8c8e8;
    }
    .divider {
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, #1a3a5c, #4a90d9, #1a3a5c);
    }
    main {
      width: 100%;
      max-width: 900px;
      padding: 60px 20px;
      flex: 1;
    }
    .index-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    /* 最新消息置中：佔第二格，左右留空 */
    .card-empty {
      visibility: hidden;
      pointer-events: none;
    }
    /* 手機版：直線排列，空白格隱藏 */
    @media (max-width: 600px) {
      .index-grid {
        grid-template-columns: 1fr;
      }
      .card-empty {
        display: none;
      }
    }
    .card {
      background-color: #ffffff;
      border: 1px solid #c8dff0;
      border-radius: 8px;
      padding: 40px 20px;
      text-align: center;
      text-decoration: none;
      color: #1a3a5c;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 2px;
      transition: all 0.2s ease;
      box-shadow: 0 2px 6px rgba(26,58,92,0.08);
    }
    .card:hover {
      background-color: #1a3a5c;
      color: white;
      transform: translateY(-3px);
      box-shadow: 0 6px 16px rgba(26,58,92,0.2);
    }
    /* 最新消息特別標色 */
    .card-news {
      background-color: #eaf4ff;
      border-color: #4a90d9;
    }
    .card-news:hover {
      background-color: #1a3a5c;
      color: white;
    }
    footer {
      width: 100%;
      background-color: #1a3a5c;
      color: #a8c8e8;
      text-align: center;
      padding: 16px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>泌尿醫學專業網站</h1>
    <h2>新光醫院　何承勳 主任</h2>
  </header>
  <div class="divider"></div>
  <main>
    <div class="index-grid">
      <!-- 第一列：左空白、最新消息、右空白 -->
      <div class="card-empty"></div>
      <a class="card card-news" href="news/index.html">最新消息</a>
      <div class="card-empty"></div>

      <!-- 第二列 -->
      <a class="card" href="prostate/index.html">攝護腺疾病</a>
      <a class="card" href="tumor/index.html">泌尿道腫瘤</a>
      <a class="card" href="stone/index.html">泌尿道結石</a>

      <!-- 第三列 -->
      <a class="card" href="hernia/index.html">疝氣</a>
      <a class="card" href="others/index.html">其他泌尿醫學</a>
      <a class="card" href="doctor/index.html">醫師介紹</a>
    </div>
  </main>
  <footer>
    © 2026 泌尿醫學專業網站　新光醫院 何承勳 主任
  </footer>
</body>
</html>
